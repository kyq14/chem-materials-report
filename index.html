<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化工新材料行业简报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #0f2027;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .date {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .tips {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 化工新材料行业简报</h1>
        <p class="date" id="date"></p>
        
        <a href="https://kyq14.github.io/chem-materials-report/reports/report_2026-03-20.html" class="btn">
            👆 点击查看今日简报
        </a>
        
        <div class="tips">
            <p>建议：点击上方按钮后，<br>选择"添加到主屏幕"</p>
            <p>下次从桌面图标打开即可查看最新简报</p>
        </div>
    </div>
    <script>
        document.getElementById('date').textContent = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>
</html>
